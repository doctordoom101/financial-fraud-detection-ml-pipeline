name: CI Retraining Workflow

on:
  push:
    paths:
      - '3_workflow_ci/MLProject/**'

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install MLflow & Dependencies
        run: pip install mlflow dagshub scikit-learn pandas

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Menjalankan MLProject
          mlflow run 3_workflow_ci/MLProject/ --no-conda